# ╔══════════════════════════════════════════════════════════════════════════╗
# ║   QuantumCrates — config.yml                                            ║
# ║   Web-First Crate Plugin  |  Paper 1.21+  |  Java 21                   ║
# ║                                                                          ║
# ║   QUICK START                                                            ║
# ║     1. Set web.secret-token to a long, random string.                   ║
# ║     2. Set web.hostname to your server IP, domain, or "auto".           ║
# ║     3. Restart the server, then run /qc web in-game.                    ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ─────────────────────────────────────────────────────────────────────────────
# DATABASE
# Supported types: sqlite (zero setup) | mysql (recommended for large servers)
# ─────────────────────────────────────────────────────────────────────────────
database:
  # "sqlite" stores data in a single file inside the plugin folder.
  # "mysql" requires a running MySQL 8+ / MariaDB server.
  type: sqlite

  sqlite:
    # File path relative to /plugins/QuantumCrates/
    file: quantumcrates.db

  mysql:
    host: localhost
    port: 3306
    database: quantumcrates
    username: root
    password: changeme
    # HikariCP connection pool size — 10 is sufficient for most servers.
    pool-size: 10
    # Timeouts in milliseconds (adjust only if you experience drops).
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000

# ─────────────────────────────────────────────────────────────────────────────
# GENERAL SETTINGS
# ─────────────────────────────────────────────────────────────────────────────
settings:
  # Enables verbose console output for debugging crate events and DB queries.
  debug: false

  # Whether to record every crate opening in the database (analytics).
  log-openings: true

  # Maximum number of simultaneous crate animations across all players.
  # Increase this on high-population servers (costs RAM per session).
  max-concurrent-openings: 50

# ─────────────────────────────────────────────────────────────────────────────
# KEY SYSTEM
# Two modes:
#   virtual  — Keys are stored as a database balance. Secure and recommended.
#   physical — Keys are physical items with a PDC tag. Tradeable between players.
# ─────────────────────────────────────────────────────────────────────────────
keys:
  mode: virtual

  physical:
    # Bukkit Material used for the physical key item.
    material: TRIPWIRE_HOOK

    # Custom Model Data for resource-pack support. Set to -1 to disable.
    custom-model-data: -1

    # Display name of the physical key item. Supports & color codes.
    # Placeholder: {key} → the key ID.
    display-name: "&bCrate Key &8[&7{key}&8]"

    # First lore line showing the key ID (used for item identification).
    id-lore: "&7Key ID: &e{key}"

    # Additional lore lines appended below the ID line.
    extra-lore:
      - ""
      - "&8▸ &7Right-click a crate to use."

# ─────────────────────────────────────────────────────────────────────────────
# HOLOGRAMS
# Providers:
#   decentholograms — Requires the DecentHolograms plugin (recommended).
#   packet          — Built-in ArmorStand holograms, no extra dependency.
# ─────────────────────────────────────────────────────────────────────────────
holograms:
  provider: packet
  # How often (in seconds) holograms are refreshed with live data.
  update-interval: 10

# ─────────────────────────────────────────────────────────────────────────────
# WEB DASHBOARD
# NOTE: Changing port or enabled requires a full server restart.
# ─────────────────────────────────────────────────────────────────────────────
web:
  enabled: true

  # The IP or domain shown in the magic link printed by /qc web.
  # "auto"  → QuantumCrates resolves your server's local IPv4 automatically.
  # ""      → Falls back to "localhost" (only useful for local testing).
  # "my.domain.com" → Use your actual public IP or domain.
  hostname: "auto"

  # Port the embedded web server listens on. Default: 7420.
  port: 7420

  # IMPORTANT: Change this before first run. Use a random 32+ character string.
  # This token is used to sign JWT sessions AND as the manual login password.
  secret-token: "CHANGE_THIS_TO_A_LONG_RANDOM_STRING_BEFORE_STARTING"

  # Allowed CORS origins for the dashboard. "*" allows all (fine for LAN/VPN).
  # For public servers restrict to your actual domain: "https://my.domain.com"
  cors-origins: "*"

  # Maximum API requests per minute per IP address. Increase for automated tools.
  rate-limit: 120

  # Log every HTTP request to the console (noisy — only useful for debugging).
  log-requests: false

# ─────────────────────────────────────────────────────────────────────────────
# CHAT MESSAGES
# All messages support & color codes.
# Edit live from the web dashboard → Messages page (no restart required).
# ─────────────────────────────────────────────────────────────────────────────
