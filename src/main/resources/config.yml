  player-only:       "&cThis command can only be used by a player."
  player-not-found:  "&cPlayer &e{player} &cwas not found or is offline."
  invalid-number:    "&cAmount must be a positive whole number."
  reload-success:    "&aAll crates, holograms, and particles have been reloaded."
  crate-not-found:   "&cNo crate found with the ID: &e{crate}"
  crate-disabled:    "&cCrate &e{crate} &cis currently disabled."
  players-only-open: "&cCrates can only be opened by players."

  # ── Offline Key Give ──────────────────────────────────────────────────────
  # Shown while resolving a name to UUID for an offline player.
