# ─────────────────────────────────────────────────────────────
# DATABASE
# ─────────────────────────────────────────────────────────────
database:
  type: sqlite   # sqlite | mysql
  sqlite:
    file: quantumcrates.db
  mysql:
    host: localhost
    port: 3306
    database: quantumcrates
    username: root
    password: password
    pool-size: 10
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000

# ─────────────────────────────────────────────────────────────
# GENERAL SETTINGS
# ─────────────────────────────────────────────────────────────
settings:
  debug: false
  log-openings: true
  max-concurrent-openings: 50

# ─────────────────────────────────────────────────────────────
# KEY SYSTEM
# ─────────────────────────────────────────────────────────────
keys:
  mode: virtual   # virtual | physical
  physical:
    material: TRIPWIRE_HOOK
    custom-model-data: -1
    display-name: "&bCrate Key &8[&7{key}&8]"
    id-lore: "&7Key ID: &e{key}"
    extra-lore:
      - ""
      - "&8▸ &7Right-click a crate to use."

# ─────────────────────────────────────────────────────────────
# HOLOGRAMS
# ─────────────────────────────────────────────────────────────
holograms:
  provider: packet   # decentholograms | packet
  update-interval: 10

# ─────────────────────────────────────────────────────────────
# WEB DASHBOARD
# CHANGING THIS REQUIRES FULL PLUGIN RESTART/SERVER RESTART
# ─────────────────────────────────────────────────────────────
web:
  enabled: true
  hostname: ""
  port: 7420
  secret-token: "CHANGE_THIS_NOW_MINIMUM_32_RANDOM_CHARS"
  cors-origins: "*"
  rate-limit: 120
  log-requests: false

# ─────────────────────────────────────────────────────────────
# CHAT MESSAGES
# ─────────────────────────────────────────────────────────────
messages:
  prefix: "&8[&aQuantumCrates&8] &r"

  # ── General ──
  no-permission:     "&cYou don't have permission to do that."
  player-only:       "&cThis command can only be used by a player."
  player-not-found:  "&cPlayer &e{player} &cnot found or offline."
  invalid-number:    "&cAmount must be a positive integer."
  reload-success:    "&aAll crates, holograms, and particles reloaded!"
  crate-not-found:   "&cCrate not found: &e{crate}&c."
  crate-disabled:    "&cCrate &e{crate} &cis currently disabled."
  players-only-open: "&cCrates can only be opened by players, not console."

  # ── Crate Opening ──
  crate-not-open:    "&cCrate &e{crate} &cis not available right now. Opens: &e{schedule}"
  cooldown-active:   "&cWait &e{time} &cbefore opening this crate again."
  already-opening:   "&cYou are already opening a crate!"
  reward-received:   "&aCongratulations! You received: &e{reward}"
  inventory-full:    "&eInventory full! &f{reward} &ewas dropped at your feet."

  # ── Key ──
  key-not-found:     "&cYou don't have the required key: &e{key}"
  key-given-sender:  "&aGave &e{amount}x &a{key} &ato &e{player}&a."
  key-given-receiver: "&aYou received &e{amount}x &a{key}&a!"
  key-insufficient:  "&cInsufficient balance to remove key &e{key}&c."
  mass-open-disabled: "&cMass open is not available for crate &e{crate}&c."
  mass-open-success: "&aSuccessfully opened &e{count}&a crates at once!"

  # ── Pity ──
  pity-status-hard: "&c&l[GUARANTEED RARE NEXT OPEN!]"
  pity-status-soft: "&e[+Bonus Chance Active]"
  pity-status-normal: "&7[Normal]"

  # ── Admin Commands ──
